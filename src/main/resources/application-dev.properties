# 로컬 Docker로 띄운 인스턴스에 연결. 자유롭게 초기화/재시작 가능해야 함.
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=root
spring.datasource.password=local
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 로컬 Ollama 컨테이너 (선택, 없으면 prod ollama로 임시 대체 가능)
ollama.base-url=${OLLAMA_URL}

logging.level.root=INFO
logging.level.com.fourien.notification=DEBUG