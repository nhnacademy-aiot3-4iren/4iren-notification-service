spring.application.name=4iren-notification
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

management.endpoints.web.exposure.exclude=health, prometheus
management.metrics.tags.application=${spring.application.name}

# 일단 유레카 설정
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# jersey를 사용하지 않도록 설정 -> 의존성 충돌
eureka.client.jersey.enabled=false


server.port=${SERVER_PORT:8080}

#telegram inbound
rabbitmq.exchange.telegram-events=telegram.events
rabbitmq.queue.telegram-inbound=notification.telegram-inbound.queue
rabbitmq.routing-key.telegram-inbound=telegram.inbound

# telegram
telegram.admin-bot.token=${TELEGRAM_ADMIN_BOT_TOKEN}
telegram.admin-bot.username=${TELEGRAM_ADMIN_BOT_USERNAME}
telegram.member-bot.token=${TELEGRAM_MEMBER_BOT_TOKEN}
telegram.member-bot.username=${TELEGRAM_MEMBER_BOT_USERNAME}
telegram.webhook.base-url=${TELEGRAM_WEBHOOK_BASE_URL}
