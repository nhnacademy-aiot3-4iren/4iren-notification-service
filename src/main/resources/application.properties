spring.application.name=notification-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

management.endpoints.web.exposure.exclude=health, prometheus
management.metrics.tags.application=${spring.application.name}

# 일단 유레카 설정
eureka.client.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false

server.port=${SERVER_PORT:8080}

#telegram inbound
rabbitmq.exchange.telegram-events=telegram.events
rabbitmq.queue.telegram-inbound=notification.telegram-inbound.queue
rabbitmq.routing-key.telegram-inbound=telegram.inbound

# telegram
telegram.admin-bot.token=${TELEGRAM_ADMIN_BOT_TOKEN}
telegram.admin-bot.username=${TELEGRAM_ADMIN_BOT_USERNAME}
telegram.member-bot.token=${TELEGRAM_MEMBER_BOT_TOKEN}
telegram.member-bot.username=${TELEGRAM_MEMBER_BOT_USERNAME}
telegram.webhook.base-url=${TELEGRAM_WEBHOOK_BASE_URL}

# Resilience4j 설정 (CoreApiClient용) - window-type은 트래픽 보고 TIME_BASED로 바꾸거나 window-size를 늘리기
# 실패율/윈도우 판단 기준을 "최근 N초"가 아니라 "최근 N번 호출"로 잡음 (지금은 호출량이 일정치 않아서 이쪽이 유리)
resilience4j.circuitbreaker.instances.coreApi.sliding-window-type=COUNT_BASED
# 판단에 사용할 최근 호출 개수 (이 10건 중 실패율을 아래 failure-rate-threshold와 비교)
resilience4j.circuitbreaker.instances.coreApi.sliding-window-size=10
# 최소 이만큼 호출이 쌓이기 전엔 실패율 계산 자체를 안 함 (호출 3~4건만으로 서킷 여는 것 방지)
resilience4j.circuitbreaker.instances.coreApi.minimum-number-of-calls=5
# 이 비율(%) 이상 실패하면 서킷 OPEN (이후 호출은 즉시 실패 처리, 실제 요청 안 나감)
resilience4j.circuitbreaker.instances.coreApi.failure-rate-threshold=50
# OPEN 상태를 유지하는 시간 - 이 시간이 지나면 HALF_OPEN으로 전환해서 다시 시도해봄
resilience4j.circuitbreaker.instances.coreApi.wait-duration-in-open-state=10s
# HALF_OPEN 상태에서 시험 삼아 통과시켜볼 호출 수 - 이 중 실패율이 다시 임계치 넘으면 OPEN으로 복귀, 아니면 CLOSED로 복귀
resilience4j.circuitbreaker.instances.coreApi.permitted-number-of-calls-in-half-open-state=3
# wait-duration 경과 후 별도 호출 없이 자동으로 HALF_OPEN 전환 (수동으로 안 건드려도 됨)
resilience4j.circuitbreaker.instances.coreApi.automatic-transition-from-open-to-half-open-enabled=true

# Feign 자체 타임아웃 (CoreApi 호출용) - 서킷브레이커의 실패 판단과 별개로, 연결/응답 자체가 이 시간 넘으면 타임아웃 예외 발생
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.coreApi.connect-timeout=1000
spring.cloud.openfeign.client.config.coreApi.read-timeout=2000

