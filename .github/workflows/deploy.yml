name: Notification Server CI/CD

# 스크립트 실행 시기
on:
  push:
    branches: [ "main" ] # main 브랜치에 push 발생할 때

# 권한 설정
permissions:
  contents: read
  packages: write # GHCR(저장소)에 이미지를 올릴 권한

jobs:
  # 1. 빌드 및 GHCR 업로드
  build-and-push:
    runs-on: ubuntu-latest # GitHub 클라우드 서버 빌려 쓰기
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: JDK 21 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven 실행 권한 부여
        run: chmod +x ./mvnw

      - name: Maven으로 코드 빌드하기 (Spring Boot JAR 생성)
        run: ./mvnw clean package -DskipTests # 테스트 생략 (배포 속도 향상)

      - name: GHCR (GitHub 이미지 저장소) 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GitHub이 자동으로 발급해주는 임시 토큰 사용
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker build & push 과정
      - name: Docker 이미지 빌드 및 GHCR에 업로드
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/team4-notification:latest .
          docker push ghcr.io/${{ github.repository_owner }}/team4-notification:latest

  # 2. 서버에 배포
  deploy:
    needs: build-and-push # 1번 작업이 끝나고 실행
    runs-on: self-hosted  # 자체 서버에서 실행
    
    steps:
      - name: GHCR 로그인 (서버 내부에서 로그인)
        run: |
          echo "${{ secrets.DEPLOYKEY }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: 최신 이미지 다운로드 및 서버 재시작
        run: |
          # 1. 최신 이미지 당겨오기
          docker pull ghcr.io/${{ github.repository_owner }}/team4-notification:latest
          
          # 2. 기존 컨테이너 멈추고 새 컨테이너 띄우기
          cd /home/aiot3/aiot4-team4/app
          docker compose pull team4-notification-1 team4-notification-2
          docker compose up -d team4-notification-1 team4-notification-2