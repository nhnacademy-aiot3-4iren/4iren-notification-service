name: PR Code Quality Check

# 스크립트 실행 시기
on:
  pull_request:
    # develop이나 main에 pr을 하려고 할때
    branches: [ "main", "develop" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: JDK 21 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven 실행 권한 부여
        run: chmod +x ./mvnw

      - name: 코드 컴파일 및 빌드 검사
        # 코드가 컴파일 되는지 & 기본 테스트 코드 작동 여부 검사
        # 테스트 코드 아예 검사 X -> ./mvnw clean compile
        run: ./mvnw clean test